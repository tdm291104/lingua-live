<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>LinguaLive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="state-idle">

<!-- ═══════════════════════════════════════════
     EXPANDED VIEW
═══════════════════════════════════════════ -->
<div id="view-expanded" style="width:100vw;height:100vh;flex-direction:column;background:oklch(0.995 0.002 270);overflow:hidden;">

  <!-- Title bar -->
  <div class="drag-region" style="height:44px;display:flex;align-items:center;gap:12px;padding:0 16px;border-bottom:1px solid oklch(0.93 0.005 270);flex-shrink:0;">
    <div class="no-drag" style="display:flex;gap:8px;">
      <span style="width:12px;height:12px;border-radius:50%;background:oklch(0.75 0.13 25);display:block;"></span>
      <span style="width:12px;height:12px;border-radius:50%;background:oklch(0.83 0.12 90);display:block;"></span>
      <span style="width:12px;height:12px;border-radius:50%;background:oklch(0.8 0.13 145);display:block;"></span>
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-left:6px;">
      <div style="width:18px;height:18px;border-radius:5px;background:linear-gradient(135deg,oklch(0.78 0.13 295),oklch(0.66 0.16 290));display:flex;align-items:center;justify-content:center;">
        <span style="color:#fff;font-size:11px;font-weight:700;">L</span>
      </div>
      <span style="font-size:13px;font-weight:600;color:oklch(0.35 0.02 280);letter-spacing:-0.01em;">LinguaLive</span>
    </div>
    <div style="flex:1;"></div>
    <button id="btn-sidebar-toggle" class="no-drag" style="display:flex;align-items:center;gap:6px;height:28px;padding:0 11px;border-radius:7px;border:1px solid oklch(0.88 0.04 295);background:oklch(0.96 0.03 295);color:oklch(0.45 0.12 295);font-size:12px;font-weight:600;">
      ✦ AI
    </button>
  </div>

  <!-- Controls row -->
  <div style="height:58px;display:flex;align-items:center;gap:10px;padding:0 18px;border-bottom:1px solid oklch(0.94 0.005 270);flex-shrink:0;">

    <!-- Start/Stop -->
    <button id="btn-start-stop" style="display:flex;align-items:center;gap:9px;height:38px;padding:0 15px 0 13px;border-radius:10px;font-size:13px;font-weight:600;transition:all 0.15s;">
      <span id="btn-icon" style="width:9px;height:9px;border-radius:50%;background:currentColor;display:block;"></span>
      <span id="btn-label">Bắt đầu</span>
      <span id="btn-eq-section" style="display:none;align-items:center;gap:2px;">
        <span style="width:1px;height:16px;background:currentColor;opacity:0.25;margin:0 4px;flex-shrink:0;"></span>
        <span style="width:2.5px;background:currentColor;border-radius:2px;display:block;animation:barEq 0.9s ease-in-out 0s infinite;"></span>
        <span style="width:2.5px;background:currentColor;border-radius:2px;display:block;animation:barEq 0.9s ease-in-out 0.15s infinite;"></span>
        <span style="width:2.5px;background:currentColor;border-radius:2px;display:block;animation:barEq 0.9s ease-in-out 0.3s infinite;"></span>
        <span style="width:2.5px;background:currentColor;border-radius:2px;display:block;animation:barEq 0.9s ease-in-out 0.45s infinite;"></span>
      </span>
    </button>

    <!-- Source segmented group -->
    <div style="display:flex;align-items:center;height:38px;border-radius:10px;border:1px solid oklch(0.91 0.006 270);overflow:hidden;">
      <button id="btn-sys" data-source="system" style="display:flex;align-items:center;gap:6px;height:100%;padding:0 12px;border:none;font-size:12.5px;font-weight:500;cursor:pointer;font-family:inherit;">
        <span style="font-size:14px;">🔊</span><span>Máy</span>
      </button>
      <div style="width:1px;height:20px;background:oklch(0.91 0.006 270);flex-shrink:0;"></div>
      <button id="btn-mic" data-source="mic" style="display:flex;align-items:center;gap:6px;height:100%;padding:0 12px;border:none;font-size:12.5px;font-weight:500;cursor:pointer;font-family:inherit;">
        <span style="font-size:14px;">🎙</span><span>Mic</span>
      </button>
    </div>

    <div style="flex:1;"></div>

    <!-- Language picker -->
    <div id="lang-picker-wrap" style="position:relative;">
      <button id="btn-lang-picker" style="display:flex;align-items:center;gap:7px;height:38px;padding:0 11px 0 12px;border-radius:10px;border:1px solid oklch(0.91 0.006 270);background:oklch(0.99 0.002 270);font-family:inherit;cursor:pointer;transition:background 0.1s,border-color 0.1s;">
        <span id="lang-src-flag" style="font-size:14px;line-height:1;">🇬🇧</span>
        <span id="lang-src-code" style="font-size:12.5px;font-weight:600;color:oklch(0.4 0.04 290);">EN</span>
        <span style="font-size:12px;color:oklch(0.7 0.02 280);">→</span>
        <span id="lang-tgt-flag" style="font-size:14px;line-height:1;">🇻🇳</span>
        <span id="lang-tgt-code" style="font-size:12.5px;font-weight:600;color:oklch(0.4 0.04 290);">VI</span>
        <span id="lang-chevron" style="font-size:10px;color:oklch(0.6 0.02 280);margin-left:1px;display:inline-block;transition:transform 0.15s;">▾</span>
      </button>
      <div id="lang-popover" style="display:none;position:absolute;top:44px;right:0;z-index:50;width:340px;background:oklch(0.997 0.001 270);border:1px solid oklch(0.9 0.006 270);border-radius:13px;box-shadow:0 18px 44px -12px oklch(0.4 0.04 280/0.32);padding:6px;flex-direction:row;gap:4px;">
        <div style="flex:1;display:flex;flex-direction:column;">
          <div style="font-size:10.5px;font-weight:700;color:oklch(0.6 0.015 280);text-transform:uppercase;letter-spacing:0.04em;padding:9px 10px 6px;">Ngôn ngữ nghe</div>
          <div id="lang-src-list" class="ll-scroll" style="display:flex;flex-direction:column;gap:1px;max-height:230px;overflow-y:auto;"></div>
        </div>
        <div style="width:1px;background:oklch(0.94 0.005 270);margin:8px 2px;flex-shrink:0;"></div>
        <div style="flex:1;display:flex;flex-direction:column;">
          <div style="font-size:10.5px;font-weight:700;color:oklch(0.6 0.015 280);text-transform:uppercase;letter-spacing:0.04em;padding:9px 10px 6px;">Dịch sang</div>
          <div id="lang-tgt-list" class="ll-scroll" style="display:flex;flex-direction:column;gap:1px;max-height:230px;overflow-y:auto;"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Body -->
  <div style="flex:1;display:flex;min-height:0;">

    <!-- Transcript column -->
    <div id="transcript-scroll" class="ll-scroll" style="flex:1;overflow-y:auto;padding:22px 26px 40px;">

      <!-- Idle state -->
      <div class="when-idle" style="height:100%;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 40px;">
        <div style="width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,oklch(0.95 0.03 295),oklch(0.9 0.05 295));display:flex;align-items:center;justify-content:center;margin-bottom:20px;">
          <span style="font-size:28px;">🎧</span>
        </div>
        <div style="font-size:17px;font-weight:600;color:oklch(0.35 0.02 280);">Sẵn sàng lắng nghe</div>
        <div style="font-size:13.5px;line-height:1.55;color:oklch(0.58 0.015 280);margin-top:7px;max-width:360px;">
          Nhấn <span style="font-weight:600;color:oklch(0.5 0.12 295);">Bắt đầu</span> để LinguaLive ghi lại và dịch âm thanh theo thời gian thực.
        </div>
      </div>

      <!-- Listening state -->
      <div class="when-listening" id="lines-wrapper" style="max-width:620px;margin:0 auto;flex-direction:column;gap:18px;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:2px;">
          <span id="session-date" style="font-family:'Geist Mono',monospace;font-size:11px;color:oklch(0.68 0.01 270);letter-spacing:0.02em;"></span>
          <div style="flex:1;height:1px;background:oklch(0.93 0.005 270);"></div>
        </div>
        <div id="lines-container"><div id="committed-lines"></div><div id="live-line"></div></div>
      </div>
    </div>

    <!-- Sidebar -->
    <div id="sidebar" style="width:320px;flex-shrink:0;border-left:1px solid oklch(0.93 0.005 270);background:oklch(0.985 0.003 280);flex-direction:column;">

      <!-- Header -->
      <div style="padding:14px 18px 12px;border-bottom:1px solid oklch(0.93 0.005 270);flex-shrink:0;">
        <div style="font-size:13.5px;font-weight:600;color:oklch(0.3 0.02 280);">✦ Trợ lý AI</div>
        <div id="sidebar-sub" style="font-size:12px;color:oklch(0.6 0.015 280);margin-top:3px;">Tạm dừng</div>
      </div>

      <!-- Chat history -->
      <div id="chat-history" class="ll-scroll" style="flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:10px;"></div>

      <!-- Quick chips -->
      <div style="padding:0 14px 10px;display:flex;flex-wrap:wrap;gap:6px;flex-shrink:0;">
        <button class="ai-chip" data-q="Tôi đang bị hỏi gì?">Đang hỏi gì?</button>
        <button class="ai-chip" data-q="Bây giờ tôi nên nói gì?">Nên nói gì?</button>
        <button class="ai-chip" data-q="Tóm tắt cuộc trò chuyện">Tóm tắt</button>
      </div>

      <!-- Input -->
      <div style="padding:0 14px 16px;flex-shrink:0;">
        <div style="display:flex;align-items:center;gap:8px;min-height:40px;background:oklch(0.995 0.002 270);border:1px solid oklch(0.9 0.006 270);border-radius:10px;padding:6px 6px 6px 13px;">
          <input id="chat-input" placeholder="Hỏi về cuộc trò chuyện…" style="flex:1;border:none;background:transparent;font-size:13px;color:oklch(0.3 0.02 280);font-family:inherit;">
          <button id="chat-submit" style="width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,oklch(0.72 0.14 295),oklch(0.62 0.17 290));color:#fff;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">↑</button>
        </div>
      </div>
    </div>
  </div>
</div>


<script src="app.js"></script>
</body>
</html>
